<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דירה חדשה - סנכרון חי 🏠</title>
  <style>
    :root {
      --primary: #0d9488; --primary-dark: #0f766e; --primary-light: #ccfbf1;
      --secondary: #0ea5e9; --bg: #f0fdf9; --surface: #ffffff;
      --surface2: #f8fafc; --border: #e2e8f0; --text: #1e293b;
      --text-muted: #64748b; --danger: #ef4444; --danger-light: #fee2e2;
      --warning: #f97316; --warning-light: #ffedd5; --success: #22c55e;
      --success-light: #dcfce7; --blue: #3b82f6; --blue-light: #dbeafe;
      --radius: 12px; --radius-sm: 8px; --shadow: 0 1px 3px rgba(0,0,0,.08);
      --transition: .18s ease;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; padding: 10px 20px; }
    nav { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
    .nav-btn { padding: 8px 16px; border: none; border-radius: 20px; cursor: pointer; background: transparent; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
    .nav-btn.active { background: var(--primary); color: #fff; }
    main { padding: 20px; max-width: 1000px; margin: 0 auto; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .stat-card { background: var(--surface); padding: 15px; border-radius: var(--radius); border-top: 3px solid var(--primary); box-shadow: var(--shadow); }
    .stat-label { font-size: 12px; color: var(--text-muted); }
    .stat-value { font-size: 20px; font-weight: 800; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
    .item-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .card-img { width: 100%; height: 150px; object-fit: cover; background: #eee; }
    .card-img-placeholder { height: 150px; background: var(--primary-light); display: flex; align-items: center; justify-content: center; font-size: 40px; }
    .card-body { padding: 15px; }
    .card-title { font-weight: 700; font-size: 18px; margin-bottom: 8px; }
    .tag { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; margin-left: 4px; }
    .tag-room { background: #ede9fe; color: #6d28d9; }
    .tag-category { background: #fef9c3; color: #854d0e; }
    .tag-status-לקנייה { background: var(--blue-light); color: var(--blue); }
    .tag-status-הוזמן { background: var(--warning-light); color: var(--warning); }
    .tag-status-סופק { background: var(--success-light); color: #15803d; }
    .card-actions { display: flex; gap: 8px; padding: 10px 15px; border-top: 1px solid var(--border); }
    .btn-edit, .btn-delete { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .btn-edit { background: var(--primary-light); color: var(--primary-dark); }
    .btn-delete { background: var(--danger-light); color: var(--danger); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; width: 100%; max-width: 500px; border-radius: 15px; padding: 20px; max-height: 90vh; overflow-y: auto; }
    input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-family: inherit; }
    .btn-save { background: var(--primary); color: #fff; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; display: none; z-index: 2000; }
    #toast.show { display: block; }
    .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { flex: 1; font-size: 14px; color: var(--text); }
    .legend-count { font-weight: 700; font-size: 14px; background: var(--surface2); padding: 2px 8px; border-radius: 10px; min-width: 28px; text-align: center; }
    .dash-section { background: #fff; padding: 16px 20px; border-radius: 12px; margin-top: 10px; }
    .dash-section h3 { margin: 0 0 14px; font-size: 15px; color: var(--text); }
    .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .progress-label { width: 140px; flex-shrink: 0; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .progress-track { flex: 1; background: #f1f5f9; border-radius: 8px; height: 8px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 8px; background: #22c55e; transition: width .4s ease; }
    .progress-meta { font-size: 11px; color: var(--text-muted); white-space: nowrap; width: 52px; text-align: left; }
    .cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .cat-label { width: 130px; flex-shrink: 0; font-size: 13px; }
    .cat-bar-wrap { flex: 1; background: #f1f5f9; border-radius: 6px; height: 6px; overflow: hidden; }
    .cat-bar-fill { height: 100%; border-radius: 6px; transition: width .4s ease; }
    .cat-amount { font-size: 12px; color: var(--text-muted); white-space: nowrap; width: 80px; text-align: left; }
    .savings-box { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .savings-amount { font-size: 30px; font-weight: 800; }
    .priority-item { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .priority-item:last-child { border-bottom: none; }
    .priority-item-name { flex: 1; font-weight: 600; }
  </style>
</head>
<body>

<header>
  <h1>דירה חדשה 🏠</h1>
  <nav>
    <button class="nav-btn active" data-tab="dashboard">לוח בקרה</button>
    <button class="nav-btn" data-tab="items">רשימת פריטים</button>
  </nav>
</header>

<main>
  <div class="tab-pane active" id="tab-dashboard">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">סופק</div><div class="stat-value" id="stat-purchased">0</div></div>
      <div class="stat-card"><div class="stat-label">סה"כ פריטים</div><div class="stat-value" id="stat-total">0</div></div>
      <div class="stat-card"><div class="stat-label">שולם עד כה</div><div class="stat-value" id="stat-spent">0 ₪</div></div>
      <div class="stat-card"><div class="stat-label">צפי להשלמה</div><div class="stat-value" id="stat-projected">0 ₪</div></div>
    </div>
    <div style="background:#fff; padding:20px; border-radius:12px; margin-top:10px;">
      <h3 style="margin:0 0 16px;">מסע הרכישה שלנו</h3>
      <div style="display:flex; align-items:center; gap:24px; flex-wrap:wrap;">
        <svg id="donut-svg" width="140" height="140" viewBox="0 0 140 140" style="flex-shrink:0; direction:ltr;"></svg>
        <div style="flex:1; min-width:140px;">
          <div class="legend-row" id="legend-tobuy">
            <span class="legend-dot" style="background:#94a3b8;"></span>
            <span class="legend-label">לקנייה</span>
            <span class="legend-count" id="legend-count-tobuy">0</span>
          </div>
          <div class="legend-row" id="legend-ordered">
            <span class="legend-dot" style="background:#f97316;"></span>
            <span class="legend-label">הוזמן</span>
            <span class="legend-count" id="legend-count-ordered">0</span>
          </div>
          <div class="legend-row" id="legend-delivered">
            <span class="legend-dot" style="background:#22c55e;"></span>
            <span class="legend-label">סופק</span>
            <span class="legend-count" id="legend-count-delivered">0</span>
          </div>
          <div id="donut-empty-msg" style="color:var(--text-muted);font-size:13px;display:none;">עוד אין פריטים</div>
        </div>
      </div>
    </div>
    <div style="background:#fff; padding:15px; border-radius:12px; margin-top:10px;">
        <h3>חלוקת תשלומים</h3>
        <p>נרי: <b id="spend-neri">0 ₪</b> | נועה: <b id="spend-noa">0 ₪</b> | משותף: <b id="spend-shared">0 ₪</b></p>
        <p style="margin-top:8px; color:var(--text-muted); font-size:14px;">⚡ סה"כ הוצאות על מוצרי חשמל: <b id="spend-appliances" style="color:var(--text);">0 ₪</b></p>
    </div>

    <div class="dash-section" id="section-savings"></div>
    <div class="dash-section" id="section-cat-spend"></div>
    <div class="dash-section" id="section-room-progress"></div>
    <div class="dash-section" id="section-priority-alert"></div>
  </div>

  <div class="tab-pane" id="tab-items">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 id="items-count-label">פריטים</h2>
        <button class="btn-save" style="width:auto;" onclick="openItemModal()">+ הוסף פריט</button>
    </div>
    <div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
        <select id="filter-status" style="flex:1; min-width:100px;"><option value="">כל הסטטוסים</option><option>לקנייה</option><option>הוזמן</option><option>סופק</option></select>
        <select id="filter-room" style="flex:1; min-width:100px;">
          <option value="">כל החדרים</option>
          <option>מרפסת</option>
          <option>חדר שינה</option>
          <option>מטבח</option>
          <option>סלון</option>
          <option>משרד</option>
          <option>חדר שירותים מאסטר</option>
          <option>חדר שירותים נפרד</option>
        </select>
        <select id="filter-category" style="flex:1; min-width:100px;">
          <option value="">כל הסוגים</option>
          <option>ריהוט</option>
          <option>מוצרי חשמל</option>
          <option>טקסטיל</option>
          <option>תאורה</option>
          <option>אקססוריז</option>
          <option>תחזוקה/גינון</option>
          <option>כלי מטבח</option>
        </select>
    </div>
    <div class="cards-grid" id="items-grid"></div>
    <div id="items-empty" style="text-align:center; padding:40px; display:none;">עוד לא הוספתם פריטים...</div>
  </div>
</main>

<div class="modal-overlay" id="item-modal-overlay">
    <div class="modal">
        <h3>פרטי פריט</h3>
        <input type="text" id="f-title" placeholder="שם הפריט (למשל: ספה)" />
        <select id="f-room">
          <option>מרפסת</option>
          <option>חדר שינה</option>
          <option>מטבח</option>
          <option>סלון</option>
          <option>משרד</option>
          <option>חדר שירותים מאסטר</option>
          <option>חדר שירותים נפרד</option>
        </select>
        <select id="f-status"><option>לקנייה</option><option>הוזמן</option><option>סופק</option></select>
        <select id="f-category">
          <option>ריהוט</option>
          <option>מוצרי חשמל</option>
          <option>טקסטיל</option>
          <option>תאורה</option>
          <option>אקססוריז</option>
          <option>תחזוקה/גינון</option>
          <option>כלי מטבח</option>
        </select>
        <select id="f-priority"><option>חייב להיות</option><option>נחמד לקבל</option></select>
        <input type="number" id="f-est-price" placeholder="מחיר משוער" />
        <input type="number" id="f-act-price" placeholder="מחיר בפועל (אם נקנה)" />
        <select id="f-payer"><option value="">מי משלם?</option><option>neri</option><option>noa</option><option>משותף</option></select>
        <input type="url" id="f-image" placeholder="קישור לתמונה" />
        <textarea id="f-notes" placeholder="הערות..."></textarea>
        <button class="btn-save" onclick="saveItem()">שמור פריט</button>
        <button class="btn-delete" style="width:100%; margin-top:5px;" onclick="closeItemModal()">ביטול</button>
    </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAXZt6aUG6X1G1_jpXmzWL_IGHv7M6Aiyk",
  authDomain: "newhome-2199b.firebaseapp.com",
  projectId: "newhome-2199b",
  storageBucket: "newhome-2199b.firebasestorage.app",
  messagingSenderId: "204234407780",
  appId: "1:204234407780:web:5eb1bcbca6328f950cc471"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items = [];
let editingItemId = null;

// LISTENERS
db.collection("items").onSnapshot(snap => {
    items = snap.docs.map(doc => {
        const data = doc.data();
        return {id: doc.id, ...data, category: data.category || 'ריהוט'};
    });
    renderItems();
    renderDashboard();
});

// FUNCTIONS
function fmtPrice(n) { return n ? Number(n).toLocaleString() + ' ₪' : '0 ₪'; }

function renderDashboard() {
    const purchased = items.filter(i => i.status === 'סופק').length;
    const spent = items.filter(i => i.status === 'הוזמן' || i.status === 'סופק').reduce((s, i) => s + (parseFloat(i.actualPrice) || 0), 0);
    const projected = items.filter(i => i.status === 'לקנייה').reduce((s, i) => s + (parseFloat(i.estPrice) || 0), 0);
    const neri = items.filter(i => i.payer === 'neri').reduce((s, i) => s + (parseFloat(i.actualPrice) || 0), 0);
    const noa = items.filter(i => i.payer === 'noa').reduce((s, i) => s + (parseFloat(i.actualPrice) || 0), 0);
    const appliances = items.filter(i => i.category === 'מוצרי חשמל').reduce((s, i) => s + (parseFloat(i.actualPrice) || 0), 0);

    document.getElementById('stat-purchased').textContent = purchased;
    document.getElementById('stat-total').textContent = items.length;
    document.getElementById('stat-spent').textContent = fmtPrice(spent);
    document.getElementById('stat-projected').textContent = fmtPrice(projected);
    document.getElementById('spend-neri').textContent = fmtPrice(neri);
    document.getElementById('spend-noa').textContent = fmtPrice(noa);
    document.getElementById('spend-appliances').textContent = fmtPrice(appliances);
    renderDonut();
    renderSavings();
    renderCategorySpend();
    renderRoomProgress();
    renderPriorityAlert();
}

function renderSavings() {
    const active = items.filter(i => i.status === 'הוזמן' || i.status === 'סופק');
    const totalEst = active.reduce((s, i) => s + (parseFloat(i.estPrice) || 0), 0);
    const totalAct = active.reduce((s, i) => s + (parseFloat(i.actualPrice) || 0), 0);
    const savings = totalEst - totalAct;
    const el = document.getElementById('section-savings');
    if (active.length === 0) {
        el.innerHTML = `<h3>💰 סה״כ חיסכון</h3><p style="color:var(--text-muted);font-size:13px;">אין עדיין פריטים שהוזמנו או סופקו לחישוב חיסכון.</p>`;
        return;
    }
    const isPositive = savings >= 0;
    const color = isPositive ? '#16a34a' : '#dc2626';
    const bg = isPositive ? '#dcfce7' : '#fee2e2';
    const label = isPositive ? '✅ חסכתם עד כה' : '⚠️ חריגה מתקציב';
    el.innerHTML = `
        <h3>💰 סה״כ חיסכון</h3>
        <div class="savings-box">
            <div>
                <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">${label}</div>
                <div class="savings-amount" style="color:${color};">${fmtPrice(Math.abs(savings))}</div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">מבוסס על ${active.length} פריטים שהוזמנו / סופקו</div>
            </div>
            <div style="background:${bg};border-radius:12px;padding:12px 16px;text-align:center;">
                <div style="font-size:11px;color:var(--text-muted);">משוער</div>
                <div style="font-weight:700;font-size:15px;">${fmtPrice(totalEst)}</div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">בפועל</div>
                <div style="font-weight:700;font-size:15px;color:${color};">${fmtPrice(totalAct)}</div>
            </div>
        </div>`;
}

function renderCategorySpend() {
    const cats = [
        { name: 'ריהוט',         color: '#0d9488' },
        { name: 'מוצרי חשמל',    color: '#f97316' },
        { name: 'טקסטיל',        color: '#a855f7' },
        { name: 'תאורה',         color: '#eab308' },
        { name: 'אקססוריז',      color: '#3b82f6' },
        { name: 'תחזוקה/גינון',  color: '#22c55e' },
        { name: 'כלי מטבח',      color: '#ec4899' },
    ];
    const totalSpent = items.reduce((s, i) => s + (parseFloat(i.actualPrice) || 0), 0);
    const el = document.getElementById('section-cat-spend');
    const rows = cats.map(c => {
        const amt = items.filter(i => i.category === c.name).reduce((s, i) => s + (parseFloat(i.actualPrice) || 0), 0);
        if (amt === 0) return '';
        const pct = totalSpent > 0 ? Math.round((amt / totalSpent) * 100) : 0;
        return `<div class="cat-row">
            <div class="cat-label">${getCategoryEmoji(c.name)} ${c.name}</div>
            <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${pct}%;background:${c.color};"></div></div>
            <div class="cat-amount">${fmtPrice(amt)} <span style="color:var(--text-muted)">(${pct}%)</span></div>
        </div>`;
    }).join('');
    el.innerHTML = `<h3>📊 הוצאות לפי קטגוריה</h3>${rows || '<p style="color:var(--text-muted);font-size:13px;">אין עדיין הוצאות מתועדות.</p>'}`;
}

function renderRoomProgress() {
    const rooms = ['מרפסת','חדר שינה','מטבח','סלון','משרד','חדר שירותים מאסטר','חדר שירותים נפרד'];
    const el = document.getElementById('section-room-progress');
    const rows = rooms.map(r => {
        const roomItems = items.filter(i => i.room === r);
        if (roomItems.length === 0) return '';
        const delivered = roomItems.filter(i => i.status === 'סופק').length;
        const pct = Math.round((delivered / roomItems.length) * 100);
        const barColor = pct === 100 ? '#16a34a' : pct >= 50 ? '#0d9488' : '#f97316';
        return `<div class="progress-row">
            <div class="progress-label">${getRoomEmoji(r)} ${r}</div>
            <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${barColor};"></div></div>
            <div class="progress-meta">${delivered}/${roomItems.length} · ${pct}%</div>
        </div>`;
    }).join('');
    el.innerHTML = `<h3>🏠 התקדמות לפי חדר</h3>${rows || '<p style="color:var(--text-muted);font-size:13px;">אין עדיין פריטים.</p>'}`;
}

function renderPriorityAlert() {
    const mustHaves = items.filter(i => i.priority === 'חייב להיות' && i.status === 'לקנייה').slice(0, 5);
    const el = document.getElementById('section-priority-alert');
    if (mustHaves.length === 0) {
        el.innerHTML = `<h3>🚨 פריטי חובה שטרם נרכשו</h3><p style="color:#16a34a;font-size:13px;font-weight:600;">✅ כל פריטי החובה נרכשו! כל הכבוד!</p>`;
        return;
    }
    const rows = mustHaves.map(i => `
        <div class="priority-item">
            <span style="font-size:20px;">${getCategoryEmoji(i.category)}</span>
            <span style="font-size:16px;">${getRoomEmoji(i.room)}</span>
            <span class="priority-item-name">${i.title}</span>
            <span class="tag tag-room" style="font-size:10px;">${i.room}</span>
        </div>`).join('');
    el.innerHTML = `<h3>🚨 פריטי חובה שטרם נרכשו <span style="background:#fee2e2;color:#dc2626;font-size:12px;padding:2px 8px;border-radius:10px;font-weight:700;">${mustHaves.length}</span></h3>${rows}`;
}

function renderDonut() {
    const toBuy = items.filter(i => i.status === 'לקנייה').length;
    const ordered = items.filter(i => i.status === 'הוזמן').length;
    const delivered = items.filter(i => i.status === 'סופק').length;
    const total = toBuy + ordered + delivered;

    document.getElementById('legend-count-tobuy').textContent = toBuy;
    document.getElementById('legend-count-ordered').textContent = ordered;
    document.getElementById('legend-count-delivered').textContent = delivered;

    const svg = document.getElementById('donut-svg');
    const emptyMsg = document.getElementById('donut-empty-msg');

    if (total === 0) {
        svg.innerHTML = '';
        emptyMsg.style.display = 'block';
        return;
    }
    emptyMsg.style.display = 'none';

    const cx = 70, cy = 70, r = 54, strokeW = 22;
    const circ = 2 * Math.PI * r;
    const segments = [
        { count: toBuy,    color: '#94a3b8' },
        { count: ordered,  color: '#f97316' },
        { count: delivered, color: '#22c55e' },
    ];

    let offset = 0;
    const gap = total > 1 ? 2 : 0;
    let paths = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f1f5f9" stroke-width="${strokeW}"/>`;

    segments.forEach(seg => {
        if (seg.count === 0) return;
        const dash = (seg.count / total) * circ - gap;
        paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
            stroke="${seg.color}" stroke-width="${strokeW}"
            stroke-dasharray="${dash} ${circ - dash}"
            stroke-dashoffset="${-offset}"
            transform="rotate(-90 ${cx} ${cy})"
            style="transition: stroke-dasharray .4s ease"/>`;
        offset += (seg.count / total) * circ;
    });

    const pct = total > 0 ? Math.round((delivered / total) * 100) : 0;
    paths += `<text x="${cx}" y="${cy - 6}" text-anchor="middle" font-size="22" font-weight="800" fill="#1e293b">${pct}%</text>`;
    paths += `<text x="${cx}" y="${cy + 14}" text-anchor="middle" font-size="11" fill="#64748b">הושלם</text>`;

    svg.innerHTML = paths;
}

function getRoomEmoji(room) {
    return { 'חדר שינה': '🛏️', 'משרד': '🖥️', 'חדר שירותים מאסטר': '🛁', 'חדר שירותים נפרד': '🚿', 'מסדרון': '🚪', 'סלון': '🛋️', 'מרפסת': '🪴', 'מטבח': '🍳' }[room] || '🏠';
}

function getCategoryEmoji(category) {
    return { 'ריהוט': '🛋️', 'מוצרי חשמל': '⚡', 'טקסטיל': '🧶', 'תאורה': '💡', 'אקססוריז': '🖼️', 'תחזוקה/גינון': '🛠️', 'כלי מטבח': '🍴' }[category] || '📦';
}

function renderItems() {
    const grid = document.getElementById('items-grid');
    const fs = document.getElementById('filter-status').value;
    const fr = document.getElementById('filter-room').value;
    const fc = document.getElementById('filter-category').value;

    const filtered = items.filter(i =>
        (!fs || i.status === fs) &&
        (!fr || i.room === fr) &&
        (!fc || i.category === fc)
    );
    grid.innerHTML = filtered.map(i => `
        <div class="item-card">
            ${i.imageUrl ? `<img src="${i.imageUrl}" class="card-img">` : `<div class="card-img-placeholder"><span style="font-size:36px;">${getCategoryEmoji(i.category)}</span><span style="font-size:22px; margin-right:4px; opacity:0.7;">${getRoomEmoji(i.room)}</span></div>`}
            <div class="card-body">
                <div class="card-title">${getCategoryEmoji(i.category)} ${getRoomEmoji(i.room)} ${i.title}</div>
                <span class="tag tag-room">${getRoomEmoji(i.room)} ${i.room}</span>
                <span class="tag tag-category">${getCategoryEmoji(i.category)} ${i.category || 'ריהוט'}</span>
                <span class="tag tag-status-${i.status}">${i.status}</span>
                <div style="margin-top:10px; font-weight:bold;">${fmtPrice(i.actualPrice)}</div>
            </div>
            <div class="card-actions">
                <button class="btn-edit" onclick="openItemModal('${i.id}')">עריכה</button>
                <button class="btn-delete" onclick="deleteItem('${i.id}')">מחק</button>
            </div>
        </div>
    `).join('');
}

async function saveItem() {
    const id = editingItemId || Math.random().toString(36).substr(2, 9);
    await db.collection("items").doc(id).set({
        title: document.getElementById('f-title').value,
        room: document.getElementById('f-room').value,
        status: document.getElementById('f-status').value,
        category: document.getElementById('f-category').value,
        actualPrice: document.getElementById('f-act-price').value,
        estPrice: document.getElementById('f-est-price').value,
        payer: document.getElementById('f-payer').value,
        imageUrl: document.getElementById('f-image').value,
        notes: document.getElementById('f-notes').value
    });
    closeItemModal();
}

async function deleteItem(id) { if(confirm('למחוק?')) await db.collection("items").doc(id).delete(); }

// UI HELPERS
function openItemModal(id) {
    editingItemId = id || null;
    if(id) {
        const i = items.find(x => x.id === id);
        document.getElementById('f-title').value = i.title || '';
        document.getElementById('f-room').value = i.room || 'מרפסת';
        document.getElementById('f-status').value = i.status || 'לקנייה';
        document.getElementById('f-category').value = i.category || 'ריהוט';
        document.getElementById('f-est-price').value = i.estPrice || '';
        document.getElementById('f-act-price').value = i.actualPrice || '';
        document.getElementById('f-payer').value = i.payer || '';
        document.getElementById('f-image').value = i.imageUrl || '';
        document.getElementById('f-notes').value = i.notes || '';
    } else {
        document.getElementById('f-title').value = '';
        document.getElementById('f-room').value = 'מרפסת';
        document.getElementById('f-status').value = 'לקנייה';
        document.getElementById('f-category').value = 'ריהוט';
        document.getElementById('f-est-price').value = '';
        document.getElementById('f-act-price').value = '';
        document.getElementById('f-payer').value = '';
        document.getElementById('f-image').value = '';
        document.getElementById('f-notes').value = '';
    }
    document.getElementById('item-modal-overlay').classList.add('open');
}
function closeItemModal() { document.getElementById('item-modal-overlay').classList.remove('open'); }

document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
});

document.getElementById('filter-status').addEventListener('change', renderItems);
document.getElementById('filter-room').addEventListener('change', renderItems);
document.getElementById('filter-category').addEventListener('change', renderItems);
</script>
